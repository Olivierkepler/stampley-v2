version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Amplify sets NODE_ENV=production; plain `npm ci` skips devDependencies and breaks `next build` (Tailwind/PostCSS, TypeScript).
        - npm ci --include=dev
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*