version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - printenv | grep -E '^(AUTH_SECRET|AUTH_TRUST_HOST|DATABASE_URL|NEXTAUTH_SECRET|NEXTAUTH_URL)=' >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*